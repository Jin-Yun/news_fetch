[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311', 'py312']

[tool.flake8]
max-line-length = 88
extend-ignore = ['E203']

[tool.mypy]
python_version = "3.9"
strict = false
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
